name: Agrolense CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build & Test Backend
  # ─────────────────────────────────────────
  build-backend:
    name: Build .NET Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore Dependencies
        run: dotnet restore Backend/SmartCropAPI/SmartCropAPI.csproj

      - name: Build
        run: dotnet build Backend/SmartCropAPI/SmartCropAPI.csproj -c Release --no-restore

  # ─────────────────────────────────────────
  # JOB 2: Build & Push Docker Image
  # ─────────────────────────────────────────
  docker-build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-backend

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_HUB_USERNAME }}/agrolense-api:latest \
            -t ${{ secrets.DOCKER_HUB_USERNAME }}/agrolense-api:v${{ github.run_number }} \
            .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/agrolense-api:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/agrolense-api:v${{ github.run_number }}

  # ─────────────────────────────────────────
  # JOB 3: Deploy Backend to Railway
  # ─────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service agrolense
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ─────────────────────────────────────────
  # JOB 4: Deploy Frontend to Vercel
  # ─────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: |
          cd Frontend
          npm install

      - name: Build Angular App
        run: |
          cd Frontend
          npm run build -- --configuration production

      - name: Deploy to Vercel
        run: |
          npm install -g vercel
          cd Frontend
          vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
